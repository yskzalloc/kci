name: KCI Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 4 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install kci
        run: pip install -e .

      - name: kci init
        run: kci init

      - name: Clone upstream kernel
        run: git clone --depth 1 https://github.com/torvalds/linux.git ~/linux

      - name: kci build
        run: |
          source $HOME/venv-virtme/bin/activate
          kci build -k ~/linux LLVM=1

      - name: kci run
        run: |
          source $HOME/venv-virtme/bin/activate
          kci run -k ~/linux

      - name: kci report
        if: always()
        run: |
          source $HOME/venv-virtme/bin/activate
          kci report -k ~/linux

      - name: Show report
        if: always()
        run: cat /tmp/kci-report.md

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ~/linux/test-results/
            /tmp/kci-report.md

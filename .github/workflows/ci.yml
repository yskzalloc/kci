name: KCI Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 4 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install kci
        run: pip install -e .

      - name: kci init
        run: kci init

      - name: Clone upstream kernel
        run: git clone --depth 1 https://github.com/torvalds/linux.git ~/linux

      - name: kci build
        run: |
          source $HOME/venv-virtme/bin/activate
          kci build -k ~/linux LLVM=1

      - name: kci run
        run: |
          source $HOME/venv-virtme/bin/activate
          kci run -k ~/linux

      - name: kci run stress
        run: |
          source $HOME/venv-virtme/bin/activate
          kci run stress -k ~/linux

      - name: kci report
        if: always()
        run: |
          source $HOME/venv-virtme/bin/activate
          kci report -k ~/linux

      - name: Show detailed results
        if: always()
        run: |
          echo "=== REPORT ==="
          cat /tmp/kci-report.md
          echo ""
          echo "=== KUNIT RESULTS ==="
          cat ~/linux/test-results/kunit.txt 2>/dev/null || echo "(empty)"
          echo ""
          echo "=== KUNIT FAILURES ==="
          grep "not ok" ~/linux/test-results/kunit.txt 2>/dev/null || echo "(none)"
          echo ""
          echo "=== KSELFTEST ALL FAILURES ==="
          grep "^not ok" ~/linux/test-results/kselftest.txt 2>/dev/null || echo "(none)"
          echo ""
          echo "=== KSELFTEST SUMMARY (per suite) ==="
          grep "# Totals" ~/linux/test-results/kselftest.txt 2>/dev/null || echo "(none)"
          echo ""
          echo "=== KVM-UNIT-TESTS FAILURES ==="
          grep "^FAIL" ~/linux/test-results/kvm-unit-tests.txt 2>/dev/null || echo "(none)"
          echo ""
          echo "=== KASAN/UBSAN/OOPS BUGS ==="
          grep -E "(BUG:|KASAN:|UBSAN:|Oops:)" ~/linux/test-results/kselftest.txt 2>/dev/null || echo "(none)"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ~/linux/test-results/
            /tmp/kci-report.md
            /tmp/kci-report.json
